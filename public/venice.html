<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>威尼斯页面 — Elvin</title>
    <meta name="description" content="威尼斯页面的二级内容示例" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f5f0;
        --surface: #ffffff;
        --text-primary: #1a1a1a;
        --text-secondary: #6b6b6b;
        --border: rgba(0,0,0,0.08);
        --divider: rgba(0,0,0,0.06);
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: 'Noto Sans SC', -apple-system, sans-serif;
        font-weight: 300;
        line-height: 1.8;
        min-height: 100vh;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(245, 245, 240, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--divider);
        padding: 0 max(24px, 5vw);
      }

      .header-inner {
        max-width: 860px;
        margin: 0 auto;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .site-name {
        font-family: 'DM Serif Display', serif;
        font-size: 1.1rem;
        letter-spacing: 0.02em;
        color: var(--text-primary);
        text-decoration: none;
        opacity: 0.9;
      }

      .back-link {
        font-size: 0.78rem;
        color: var(--text-secondary);
        text-decoration: none;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.2s;
      }

      .back-link:hover { color: var(--text-primary); }
      .back-link::before { content: '←'; font-size: 0.9em; }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 72px max(24px, 5vw) 120px;
      }

      h1 {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(2.6rem, 6vw, 4.2rem);
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: -0.01em;
        margin-bottom: 24px;
      }

      p {
        font-size: 1rem;
        color: var(--text-secondary);
        line-height: 1.8;
        margin-bottom: 18px;
      }

      .note {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        margin-top: 32px;
      }

      a {
        color: var(--text-primary);
        text-decoration: none;
        border-bottom: 1px dashed rgba(0, 0, 0, 0.2);
        transition: color 0.2s;
      }

      a:hover { color: rgba(0, 0, 0, 0.8); }

      footer {
        margin-top: 80px;
        padding-top: 40px;
        border-top: 1px solid var(--divider);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
      }

      footer p {
        font-size: 0.78rem;
        color: var(--text-secondary);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>

    <header>
      <div class="header-inner">
        <a href="/" class="site-name">Elvin</a>
        <a href="/privacy.html" class="back-link">← 隐私政策</a>
      </div>
    </header>

    <main>
      <h1>威尼斯页面</h1>
      <p>这是一个作为隐私政策二级页面的示例内容。你可以在这里展示特定于“威尼斯”主题的说明、示例或链接。</p>
      <div class="note">
        <p><strong>提示：</strong>此页面已经作为“隐私政策”页面的子页面集成，可通过隐私页中提供的链接访问。</p>
      </div>
    </main>

    <footer>
      <p>© 2026 Elvin. 保留所有权利。</p>
      <p><a href="/privacy.html">← 返回隐私政策</a></p>
    </footer>

  </body>
</html>
